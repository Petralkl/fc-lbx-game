<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETTERBOXD CLASH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #222222;
  --orange: #ff6b35;
  --orange-dim: #ff6b3522;
  --green: #00e676;
  --green-dim: #00e67622;
  --red: #ff1744;
  --red-dim: #ff174422;
  --text: #f0f0f0;
  --muted: #666;
  --gold: #ffc107;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCANLINES OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ─── HEADER ─── */
header {
  border-bottom: 1px solid var(--border);
  padding: 24px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 0.08em;
  color: var(--text);
}

.logo span { color: var(--orange); }

.room-code {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ─── LAYOUT ─── */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 40px;
}

/* ─── ADD USER PANEL ─── */
.add-panel {
  padding: 40px 0;
  border-bottom: 1px solid var(--border);
}

.add-panel h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 20px;
}

.add-row {
  display: flex;
  gap: 12px;
  align-items: center;
  max-width: 560px;
}

.input-wrap {
  position: relative;
  flex: 1;
}

.input-wrap::before {
  content: 'letterboxd.com/';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  pointer-events: none;
}

input[type="text"] {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  padding: 14px 14px 14px 148px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}

input[type="text"]:focus { border-color: var(--orange); }
input[type="text"]::placeholder { color: var(--muted); }

.btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.1em;
  padding: 14px 28px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--orange);
  color: #000;
}
.btn-primary:hover { background: #ff8c5e; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: #444; }

.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid transparent;
  padding: 4px 8px;
  font-size: 0.75rem;
}
.btn-danger:hover { border-color: var(--red); }

/* ─── USERS GRID ─── */
.users-section { padding: 40px 0; }

.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 24px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.15em;
}

.section-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

.users-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.user-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
  position: relative;
  transition: border-color 0.2s;
  animation: fadeIn 0.3s ease;
}

.user-card:hover { border-color: #333; }

.user-card.loading {
  opacity: 0.6;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.user-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--orange);
}

.user-avatar img { width: 100%; height: 100%; object-fit: cover; }

.user-name {
  font-weight: 500;
  font-size: 0.9rem;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-handle {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 10px;
}

.user-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--orange);
}

.user-remove {
  position: absolute;
  top: 8px;
  right: 8px;
}

.scanning-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  padding: 3px 8px;
  background: var(--surface2);
  border-radius: 20px;
}

.dot-anim {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.7); }
}

/* ─── CTA ─── */
.cta-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 24px 0;
  border-top: 1px solid var(--border);
}

.cta-hint {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  margin-left: auto;
}

/* ─── LEADERBOARD ─── */
.leaderboard-section {
  padding: 40px 0;
  border-top: 1px solid var(--border);
}

.leaderboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 48px;
}

@media (max-width: 900px) { .leaderboard-grid { grid-template-columns: 1fr; } }

.lb-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.lb-card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.lb-card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.12em;
  color: var(--muted);
}

.match-row {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid #161616;
  gap: 12px;
  transition: background 0.15s;
  cursor: pointer;
}
.match-row:hover { background: var(--surface2); }
.match-row:last-child { border-bottom: none; }

.match-users {
  flex: 1;
  font-size: 0.85rem;
}

.match-users strong { color: var(--text); }
.match-users .vs { 
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  color: var(--muted);
  margin: 0 6px;
}

.match-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  line-height: 1;
}

.match-shared {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
}

.pct-bar {
  width: 60px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.pct-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease;
}

/* ─── CLASH VIEW ─── */
.clash-section {
  padding: 40px 0;
  border-top: 1px solid var(--border);
}

.clash-pair-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.clash-user-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid;
}

.badge-a { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
.badge-b { border-color: var(--green); color: var(--green); background: var(--green-dim); }

.clash-vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  color: var(--muted);
}

.back-btn {
  margin-left: auto;
}

.clash-films {
  display: grid;
  gap: 12px;
}

.clash-film {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 16px;
  transition: border-color 0.2s;
  animation: fadeIn 0.3s ease;
}
.clash-film:hover { border-color: #333; }

.clash-film-name {
  font-size: 0.9rem;
  font-weight: 500;
}
.clash-film-link {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  text-decoration: none;
}
.clash-film-link:hover { color: var(--orange); }

.star-rating {
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  padding: 4px 10px;
  border-radius: 4px;
  text-align: center;
  min-width: 48px;
}
.star-a { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange); }
.star-b { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }

.clash-diff {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  color: var(--red);
  min-width: 36px;
  text-align: right;
}

/* ─── AGREEMENT SECTION ─── */
.agree-film {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 20px;
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 16px;
}

.agree-stars {
  font-family: 'DM Mono', monospace;
  color: var(--gold);
  font-size: 0.85rem;
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.tab {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.12em;
  padding: 12px 24px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  margin-bottom: -1px;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }

/* ─── GENRE RADAR ─── */
.genre-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.genre-user-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
}

.genre-user-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--orange);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.genre-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.genre-label {
  font-size: 0.75rem;
  color: var(--muted);
  width: 90px;
  flex-shrink: 0;
}

.genre-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}

.genre-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--orange);
  transition: width 1s ease;
}

.genre-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  width: 32px;
  text-align: right;
}

/* ─── TOAST ─── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
}

.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  animation: slideIn 0.2s ease;
  max-width: 320px;
}
.toast.error { border-color: var(--red); color: var(--red); }
.toast.success { border-color: var(--green); color: var(--green); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(16px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ─── EMPTY STATES ─── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
}

.empty-icon {
  font-size: 2rem;
  margin-bottom: 12px;
}

/* ─── MATCH COLOR ─── */
.pct-high { color: var(--green); }
.pct-mid  { color: var(--gold); }
.pct-low  { color: var(--red); }
.fill-high { background: var(--green); }
.fill-mid  { background: var(--gold); }
.fill-low  { background: var(--red); }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

/* stars display */
.stars {
  display: inline-flex;
  gap: 1px;
}
.star { color: var(--gold); font-size: 0.8rem; }
.star.half { opacity: 0.5; }
.star.empty { color: #333; }
</style>
</head>
<body>

<header>
  <div class="logo">LETTER<span>CLASH</span></div>
  <div class="room-code" id="roomCode">ROOM · ----</div>
</header>

<div class="container">

  <!-- ADD USER -->
  <div class="add-panel">
    <h2>ADD MEMBER TO ROOM</h2>
    <div class="add-row">
      <div class="input-wrap">
        <input type="text" id="usernameInput" placeholder="username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="addUser()">SCAN</button>
    </div>
  </div>

  <!-- USERS -->
  <div class="users-section">
    <div class="section-header">
      <div class="section-title">ROOM MEMBERS</div>
      <div class="section-count" id="userCount">0 users · 0 films scanned</div>
    </div>
    <div class="users-grid" id="usersGrid">
      <div class="empty" style="grid-column: 1/-1; padding: 24px;">
        <div class="empty-icon">🎬</div>
        Add Letterboxd usernames above to get started
      </div>
    </div>
    <div class="cta-bar" id="ctaBar" style="display:none">
      <button class="btn btn-primary" onclick="runAnalysis()">⚡ CLASH THE ROOM</button>
      <button class="btn btn-ghost" onclick="clearRoom()">CLEAR ROOM</button>
      <div class="cta-hint" id="ctaHint"></div>
    </div>
  </div>

  <!-- RESULTS (hidden until analysis run) -->
  <div id="resultsSection" style="display:none">

    <!-- LEADERBOARD -->
    <div class="leaderboard-section">
      <div class="section-header">
        <div class="section-title">COMPATIBILITY LEADERBOARD</div>
      </div>

      <div class="leaderboard-grid">
        <div class="lb-card">
          <div class="lb-card-header">
            <div class="lb-card-title">🤝 BEST MATCHES</div>
          </div>
          <div id="bestMatches"></div>
        </div>
        <div class="lb-card">
          <div class="lb-card-header">
            <div class="lb-card-title">⚔️ BIGGEST CLASHES</div>
          </div>
          <div id="worstMatches"></div>
        </div>
      </div>
    </div>

    <!-- PAIR DEEP DIVE -->
    <div class="clash-section" id="clashSection">
      <div class="section-header">
        <div class="section-title">PAIR DEEP DIVE</div>
      </div>
      <div id="clashContent">
        <div class="empty">
          <div class="empty-icon">👆</div>
          Click a pair above to see their clashes and agreements
        </div>
      </div>
    </div>

    <!-- GENRE TASTE -->
    <div class="clash-section" id="genreSection">
      <div class="section-header">
        <div class="section-title">TASTE PROFILES</div>
      </div>
      <div class="genre-grid" id="genreGrid"></div>
    </div>

  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'http://localhost:3000/api';
const users = {}; // { username: { profile, ratings, filmMeta, filmCount } }
const comparisons = {}; // { 'a:b': { matchPercent, sharedCount, clashFilms, agreements } }

// Generate a fun room code
const adjectives = ['DARK','NEON','COLD','DEEP','WILD','GRIM','EPIC','BOLD'];
const nouns = ['LENS','REEL','CUT','FRAME','SHOT','FADE','TAKE','ROLL'];
const roomCode = `${adjectives[Math.floor(Math.random()*adjectives.length)]}-${nouns[Math.floor(Math.random()*nouns.length)]}-${Math.floor(Math.random()*900+100)}`;
document.getElementById('roomCode').textContent = `ROOM · ${roomCode}`;

// ─── UI HELPERS ────────────────────────────────────────────────

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function starsHTML(rating) {
  const full = Math.floor(rating);
  const half = (rating % 1) >= 0.5;
  const empty = 5 - full - (half ? 1 : 0);
  return `<span class="stars">${'★'.repeat(full)}${half ? '½' : ''}${'☆'.repeat(empty)}</span>`;
}

function pctClass(pct) {
  if (pct >= 70) return 'pct-high';
  if (pct >= 45) return 'pct-mid';
  return 'pct-low';
}
function fillClass(pct) {
  if (pct >= 70) return 'fill-high';
  if (pct >= 45) return 'fill-mid';
  return 'fill-low';
}

function updateCounts() {
  const count = Object.keys(users).length;
  const totalFilms = Object.values(users).reduce((s, u) => s + (u.filmCount || 0), 0);
  document.getElementById('userCount').textContent = `${count} user${count !== 1 ? 's' : ''} · ${totalFilms.toLocaleString()} films scanned`;

  const ctaBar = document.getElementById('ctaBar');
  const hint = document.getElementById('ctaHint');

  if (count >= 2) {
    ctaBar.style.display = 'flex';
    const pairs = count * (count - 1) / 2;
    hint.textContent = `Will compare ${pairs} pair${pairs !== 1 ? 's' : ''}`;
  } else {
    ctaBar.style.display = count >= 1 ? 'flex' : 'none';
    if (count === 1) {
      hint.textContent = 'Add at least one more user to clash';
      document.querySelector('#ctaBar .btn-primary').disabled = true;
    }
  }

  if (count >= 2) {
    document.querySelector('#ctaBar .btn-primary').disabled = false;
  }
}

// ─── USER CARDS ────────────────────────────────────────────────

function renderUsersGrid() {
  const grid = document.getElementById('usersGrid');
  const userList = Object.values(users);

  if (userList.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;padding:24px">
      <div class="empty-icon">🎬</div>Add Letterboxd usernames above to get started</div>`;
    return;
  }

  grid.innerHTML = userList.map(u => `
    <div class="user-card ${u.scanning ? 'loading' : ''}" id="card-${u.username}">
      <button class="btn btn-danger user-remove" onclick="removeUser('${u.username}')">✕</button>
      <div class="user-avatar">
        ${u.profile?.avatar ? `<img src="${u.profile.avatar}" onerror="this.parentElement.textContent='${u.username[0].toUpperCase()}'">` : u.username[0].toUpperCase()}
      </div>
      <div class="user-name">${u.profile?.displayName || u.username}</div>
      <div class="user-handle">@${u.username}</div>
      ${u.scanning ? `<div class="scanning-pill"><div class="dot-anim"></div>scanning...</div>` :
        u.filmCount ? `<div class="user-meta">${u.filmCount.toLocaleString()} rated films</div>` : ''}
    </div>
  `).join('');
}

// ─── ADD / REMOVE USERS ────────────────────────────────────────

async function addUser() {
  const input = document.getElementById('usernameInput');
  const username = input.value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
  if (!username) return;
  if (users[username]) { toast(`@${username} already in room`, 'error'); return; }

  input.value = '';
  document.getElementById('addBtn').disabled = true;

  // Add placeholder
  users[username] = { username, scanning: true };
  renderUsersGrid();
  updateCounts();

  try {
    const res = await fetch(`${API}/scan/${username}`);
    const data = await res.json();

    if (!data.success) throw new Error(data.error || 'Failed to scan user');

    users[username] = {
      username,
      profile: data.profile,
      ratings: data.ratings,
      filmMeta: data.filmMeta,
      filmCount: data.filmCount,
      scanning: false,
    };

    toast(`@${username} added · ${data.filmCount} films`, 'success');
  } catch (e) {
    delete users[username];
    toast(e.message, 'error');
  }

  renderUsersGrid();
  updateCounts();
  document.getElementById('addBtn').disabled = false;
}

function removeUser(username) {
  delete users[username];
  // Clear comparisons involving this user
  Object.keys(comparisons).forEach(k => {
    if (k.includes(username)) delete comparisons[k];
  });
  renderUsersGrid();
  updateCounts();
  document.getElementById('resultsSection').style.display = 'none';
}

function clearRoom() {
  Object.keys(users).forEach(k => delete users[k]);
  Object.keys(comparisons).forEach(k => delete comparisons[k]);
  renderUsersGrid();
  updateCounts();
  document.getElementById('resultsSection').style.display = 'none';
}

// ─── ANALYSIS ────────────────────────────────────────────────

async function runAnalysis() {
  const userList = Object.values(users).filter(u => !u.scanning && u.ratings);
  if (userList.length < 2) { toast('Need at least 2 scanned users', 'error'); return; }

  // Compute all pairs
  const pairs = [];
  for (let i = 0; i < userList.length; i++) {
    for (let j = i + 1; j < userList.length; j++) {
      pairs.push([userList[i], userList[j]]);
    }
  }

  // Run comparisons
  await Promise.all(pairs.map(async ([a, b]) => {
    const key = [a.username, b.username].sort().join(':');
    if (comparisons[key]) return;

    const res = await fetch(`${API}/compare`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userA: a, userB: b }),
    });
    const data = await res.json();
    if (data.success) comparisons[key] = { ...data, userA: a.username, userB: b.username };
  }));

  renderResults(userList);
  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── RENDER RESULTS ────────────────────────────────────────────

function renderResults(userList) {
  const allPairs = Object.values(comparisons).sort((a, b) => b.matchPercent - a.matchPercent);

  // Best matches (top half) + worst (bottom half)
  const best = [...allPairs].slice(0, 5);
  const worst = [...allPairs].sort((a, b) => a.matchPercent - b.matchPercent).slice(0, 5);

  document.getElementById('bestMatches').innerHTML = best.map(p => matchRowHTML(p, true)).join('');
  document.getElementById('worstMatches').innerHTML = worst.map(p => matchRowHTML(p, false)).join('');

  // Genre grid
  renderGenreGrid(userList);

  // Default: show best pair clash
  if (best.length > 0) showPairDetail(best[0]);
}

function matchRowHTML(pair, isBest) {
  const pct = pair.matchPercent;
  const cls = pctClass(pct);
  const fillCls = fillClass(pct);
  const key = [pair.userA, pair.userB].sort().join(':');
  return `
    <div class="match-row" onclick="showPairDetail(comparisons['${key}'])">
      <div class="match-users">
        <strong>@${pair.userA}</strong>
        <span class="vs">VS</span>
        <strong>@${pair.userB}</strong>
        <div class="match-shared">${pair.sharedCount} shared films</div>
      </div>
      <div>
        <div class="match-pct ${cls}">${pct}%</div>
        <div class="pct-bar"><div class="pct-fill ${fillCls}" style="width:${pct}%"></div></div>
      </div>
    </div>
  `;
}

function showPairDetail(pair) {
  if (!pair) return;
  const userA = users[pair.userA];
  const userB = users[pair.userB];
  const pct = pair.matchPercent;

  const section = document.getElementById('clashSection');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const clashHTML = pair.clashFilms.length === 0
    ? `<div class="empty"><div class="empty-icon">🕊️</div>No major clashes! These two agree a lot.</div>`
    : `<div class="clash-films">${pair.clashFilms.map(f => `
        <div class="clash-film">
          <div>
            <div class="clash-film-name">${f.name}</div>
            <a class="clash-film-link" href="https://letterboxd.com/film/${f.slug}/" target="_blank">letterboxd.com/film/${f.slug}</a>
          </div>
          <div class="star-rating star-a" title="@${pair.userA}">@${pair.userA}<br>${starsHTML(f.ratingA)} ${f.ratingA}★</div>
          <div class="star-rating star-b" title="@${pair.userB}">@${pair.userB}<br>${starsHTML(f.ratingB)} ${f.ratingB}★</div>
          <div class="clash-diff">△${f.diff}★</div>
        </div>
      `).join('')}</div>`;

  const agreeHTML = pair.agreements.length === 0
    ? `<div class="empty"><div class="empty-icon">🤷</div>No strong agreements found.</div>`
    : `<div class="clash-films" style="margin-top:8px">${pair.agreements.map(f => `
        <div class="agree-film">
          <div class="clash-film-name">${f.name}</div>
          <div class="agree-stars">${starsHTML(f.ratingA)} both rated ${f.ratingA}★</div>
        </div>
      `).join('')}</div>`;

  document.getElementById('clashContent').innerHTML = `
    <div class="clash-pair-header">
      <span class="clash-user-badge badge-a">@${pair.userA}</span>
      <span class="clash-vs">VS</span>
      <span class="clash-user-badge badge-b">@${pair.userB}</span>
      <span style="margin-left:12px;font-family:'Bebas Neue',sans-serif;font-size:2rem" class="${pctClass(pct)}">${pct}% match</span>
      <span style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">${pair.sharedCount} films in common</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'clash-tab')">⚔️ CLASHES (${pair.clashFilms.length})</button>
      <button class="tab" onclick="switchTab(this,'agree-tab')">🤝 AGREEMENTS (${pair.agreements.length})</button>
    </div>

    <div id="clash-tab">${clashHTML}</div>
    <div id="agree-tab" style="display:none">${agreeHTML}</div>
  `;
}

function switchTab(btn, tabId) {
  btn.closest('.clash-section, #clashContent').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['clash-tab','agree-tab'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = id === tabId ? 'block' : 'none';
  });
}

function renderGenreGrid(userList) {
  const grid = document.getElementById('genreGrid');
  if (!userList.some(u => u.genres && Object.keys(u.genres).length > 0)) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Genre data not available — Letterboxd genre pages require additional scraping.</div>`;
    return;
  }

  grid.innerHTML = userList.filter(u => u.genres).map(u => {
    const genres = Object.entries(u.genres).sort((a, b) => b[1] - a[1]).slice(0, 8);
    const max = genres[0]?.[1] || 1;
    return `
      <div class="genre-user-card">
        <div class="genre-user-title">@${u.username}</div>
        ${genres.map(([g, c]) => `
          <div class="genre-bar-row">
            <div class="genre-label">${g}</div>
            <div class="genre-bar-bg"><div class="genre-bar-fill" style="width:${Math.round(c/max*100)}%"></div></div>
            <div class="genre-count">${c}</div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

// ─── KEYBOARD ────────────────────────────────────────────────
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addUser();
});

updateCounts();
</script>
